        <style>
/* ==========================================================================
   GANGSTA MASTER ALL-IN-ONE SNIPPET (BACKGROUND + CENTER EVERYTHING)
   ========================================================================== */

/* 1. Sets your green background and page centering */
body {
    background-color: #333333 !important;
    text-align: center !important;
    margin: 0;
    padding: 30px 15px;
}

/* 2. Standard page container layout centering */
.search-wrapper {
    width: 100%;
    max-width: 750px;
    margin: 0 auto !important;
    text-align: center !important;
}

/* 3. Your custom logo sizing layout */
.logo-img {
    width: 85% !important;     
    max-width: 420px !important; 
    height: auto !important;
    margin-top: 30px;
    margin-bottom: 20px;
    display: inline-block;
}

/* 4. Centers the main Google search input bar container */
#___gcse_0, .gcse-search, .gsc-control-cse, .gsc-search-box-tools .gsc-search-box {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 auto !important;
    padding: 0 !important;
    background-color: transparent !important;
    border: none !important;
}

/* Wipes out the uneven right gap that makes the input bar crooked */
td.gsc-input {
    padding-right: 0 !important;
}

/* 5. Centers the navigation tabs row (Ebay, Amazon, YouTube) */
.gsc-tabsArea, .gsc-tabsAreaV2, [role="tablist"] {
    display: flex !important;
    justify-content: center !important;
    margin: 0 auto 15px auto !important;
}

/* 6. Centers the main results alignment frame */
.gsc-results-wrapper-visible, .gsc-results, .gsc-webResult {
    text-align: center !important;
    margin: 0 auto !important;
    width: 100% !important;
}

/* Keeps individual text results readable while aligned down the middle */
.gs-webResult, .gs-result {
    text-align: left !important; 
    margin: 0 auto 15px auto !important;
    max-width: 600px !important;
}
