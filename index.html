/* ==========================================================================
   4 S-ENGINE BASICS: BACKGROUND & PERFECT GOOGLE BAR CENTERING
   ========================================================================== */

/* 1. Sets background color and centers the base text flow */
body {
    background-color: #f1f6ef !important;
    text-align: center;
    margin: 0;
    padding: 40px 20px;
}

/* 2. Standard layout wrapper centered horizontally */
.search-wrapper {
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
}

/* 3. Forces the real Google framework structures to align dead center */
#___gcse_0, 
.gcse-search, 
.gsc-control-cse, 
table.gsc-search-box {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 auto !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
}

/* 4. Erases the asymmetrical side gap that makes the input row lean left */
td.gsc-input {
    padding-right: 0 !important;
}
