<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      /* ==========================================================================
   1. GLOBAL / DEFAULT BASE LAYOUT (Mobile Viewports: Under 768px wide)
   ========================================================================== */
body {
    background-color: #f1f6ef;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 15px;
}

.logo-img {
    max-height: 60px; /* Smaller logo so it fits mobile screens cleanly */
    width: auto;
    margin-top: 20px;
    display: inline-block;
}

.search-wrapper {
    width: 100%;
    max-width: 100%; /* Spans full width on small mobile screens */
    margin: 15px auto;
    padding: 0 10px;
    box-sizing: border-box;
}

/* Adjusts the native Google Search text size for mobile results */
.gcse-search {
    font-size: 14px;
}


/* ==========================================================================
   2. VTECH GENIO LAPTOP LAYOUT (Viewports: 768px to 1280px wide)
   ========================================================================== */
@media screen and (min-width: 768px) and (max-width: 1280px) {
    body {
        padding: 30px;
    }

    .logo-img {
        max-height: 75px; /* Scaled medium size perfect for a 7" 720p display */
        margin-top: 30px;
    }

    .search-wrapper {
        max-width: 550px; /* Snug width tailored for the Genio screen profile */
        margin: 20px auto;
        padding: 0 15px;
    }
}


/* ==========================================================================
   3. STANDARD DESKTOP LAYOUT (Viewports: Greater than 1280px wide)
   ========================================================================== */
@media screen and (min-width: 1281px) {
    body {
        padding: 50px;
    }

    .logo-img {
        max-height: 100px; /* Large crisp logo on regular monitors */
        margin-top: 50px;
    }

    .search-wrapper {
        max-width: 750px; /* Expands to utilize standard screen real estate */
        margin: 25px auto;
        padding: 0;
    }
}
    </style>
  </head>
  <body>
    
    <!-- GOOGLE ENGINE SCRIPT -->
    <script async src="https://cse.google.com/cse.js?cx=b09fcdac1f01b4622"></script>
        
    <!-- SEARCH CONTAINER -->
    <div class="search-wrapper">
        
        <!-- Fix: Set class to "logo-img" so your CSS height rule actually applies -->
        <img class="logo-img" src="https://i.postimg.cc/Hs2hsq3c/4-S-Engine-16-5-2026.png" alt="4 S-Engine Logo">
      
        <!-- Google Search Bar -->
        <div class="gcse-search"></div>
      
        <!-- Subtext -->
        <h4 style="font-family: Trebuchet MS, sans-serif; color: #1b2516;"> 
            <em>...a search engine by Westmynster</em>
        </h4>
    </div>
  </body>
</html>
