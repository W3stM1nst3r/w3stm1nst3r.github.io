<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=1024">
    <title>4 S-Engine Home</title>
    
    <style>
      /* ==========================================================================
   1. BASE LAYOUT & DESKTOP (Default layout configuration)
   ========================================================================== */
body {
    background-color: #f1f6ef !important;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
    margin: 0;
}

/* Big custom logo exactly as requested in your picture */
.logo-img {
    width: 85% !important;
    max-width: 420px !important;
    height: auto !important;
    margin-top: 30px;
    margin-bottom: 20px;
    display: inline-block;
}

/* Beautiful wide layout container to prevent text compressing */
.search-wrapper {
    width: 100%;
    max-width: 750px;
    margin: 0 auto;
    padding: 0;
    box-sizing: border-box;
}

/* Forces Google CSE layout blocks to follow desktop width rules */
#___gcse_0, .gcse-search {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 auto !important;
}


/* ==========================================================================
   2. MOBILE ZOOM RULES (Only targets phone screens under 767px)
   ========================================================================== */
@media screen and (max-width: 767px) {
    html {
        /* Zooms the layout components on phones to match your design */
        zoom: 115%; 
        -moz-transform: scale(1.15); /* Firefox zoom fallback fix */
        -moz-transform-origin: top center;
    }
    
    body {
        padding: 15px; /* Tighter margins for mobile device frame edges */
    }
}


/* ==========================================================================
   3. VTECH GENIO LAPTOP SPECIFIC SCALE (Keeps layout at standard 100%)
   ========================================================================== */
@media screen and (min-width: 768px) and (max-width: 1280px) {
    body {
        padding: 25px;
    }

    .search-wrapper {
        max-width: 600px; /* Snug, clean sizing tailored for the Genio screen */
    }
}
    </style>
  </head>
  <body>
    
    <!-- GOOGLE ENGINE SCRIPT -->
    <script async src="https://cse.google.com/cse.js?cx=b09fcdac1f01b4622"></script>
        
    <!-- SEARCH CONTAINER -->
    <div class="search-wrapper">
        
        <!-- Logo Image -->
        <img class="logo-img" src="https://i.postimg.cc/Hs2hsq3c/4-S-Engine-16-5-2026.png" alt="4 S-Engine Logo">
      
        <!-- Google Search Bar -->
        <div class="gcse-search"></div>
      
        <!-- Subtext -->
        <h4 style="font-family: Trebuchet MS, sans-serif; color: #1b2516;"> 
            <em>...a search engine by Westmynster</em>
        </h4>
    </div>
    
  </body>
</html>
