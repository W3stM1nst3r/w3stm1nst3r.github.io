<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>4 S-Engine Home</title>
    <style>
      /* ==========================================================================
         1. BASE SYSTEM (Clean and Centered Everywhere)
         ========================================================================== */
      body {
          background-color: #f1f6ef !important;
          font-family: Arial, sans-serif;
          text-align: center;
          margin: 0;
          padding: 20px;
      }

      /* Keeps the design wide and elegant so it doesn't squish on mobile */
      .search-wrapper {
          width: 100%;
          max-width: 750px; 
          margin: 0 auto;
          box-sizing: border-box;
      }

      /* Big custom logo exactly like your drawing */
      .logo-img {
          width: 85% !important;     
          max-width: 420px !important; 
          height: auto !important;
          margin-top: 30px;
          margin-bottom: 20px;
          display: inline-block;
      }

      /* Forces the real Google CSE frame to stay aligned and wide */
      #___gcse_0, .gcse-search {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 auto !important;
      }

      /* ==========================================================================
         2. FORCE GOOGLE TO ALIGN PERFECTLY WITH THE LOGO
         ========================================================================== */
      /* Wipes out Google's default uneven border box padding */
      .gsc-control-cse, .gsc-control-cse * {
          box-sizing: border-box !important;
      }

      /* Centers Google's invisible background grid */
      .gsc-control-cse {
          background-color: transparent !important;
          border: none !important;
          padding: 0 !important;
          margin: 0 auto !important;
          width: 100% !important;
      }

      /* Centers the actual form block */
      form.gsc-search-box, table.gsc-search-box {
          margin: 0 auto !important;
          width: 100% !important;
      }

      /* Removes the default right-side padding gap Google adds to the input box */
      td.gsc-input {
          padding-right: 0 !important;
      }

      /* Centers the magnifying glass button inside its cell */
      td.gsc-search-button {
          vertical-align: middle !important;
      }
    </style>
  </head>
  <body>
    
    <!-- YOUR REAL GOOGLE ENGINE SCRIPT -->
    <script async src="https://cse.google.com/cse.js?cx=b09fcdac1f01b4622"></script>
        
    <!-- SEARCH CONTAINER -->
    <div class="search-wrapper">
        
        <!-- YOUR REAL LOGO IMAGE -->
        <img class="logo-img" src="https://i.postimg.cc/Hs2hsq3c/4-S-Engine-16-5-2026.png" alt="4 S-Engine Logo">
      
        <!-- REAL GOOGLE SEARCH BAR -->
        <div class="gcse-search"></div>
      
        <!-- YOUR SUBTEXT -->
        <h4 style="font-family: Trebuchet MS, sans-serif; color: #1b2516; margin-top: 25px;"> 
            <em>...a search engine by Westmynster</em>
        </h4>
    </div>
    
  </body>
</html>
