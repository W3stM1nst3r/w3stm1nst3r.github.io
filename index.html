<!DOCTYPE html>
<html lang="en">
  <head>
        <style>
      /* ==========================================================================
         1. GLOBAL / DEFAULT BASE LAYOUT (Mobile Viewports: Under 768px wide)
         ========================================================================== */
      body {
          background-color: #f1f6ef;
          font-family: Arial, sans-serif;
          text-align: center;
          padding: 10px; /* Small outer padding for mobile edges */
          margin: 0;
      }

      .logo-img {
          max-height: 60px; /* Perfectly scaled down logo for phone screens */
          width: auto;
          margin-top: 20px;
          display: inline-block;
      }

      /* Fix: This expands the wrapper so mobile results aren't squished */
      .search-wrapper {
          width: 100%;
          max-width: 100%;
          margin: 15px auto;
          padding: 0; /* REMOVED the 100px padding causing the compression bug */
          box-sizing: border-box;
      }

      /* Forces Google's internal layout elements to match the fluid layout */
      #___gcse_0, .gcse-search {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 auto !important;
      }

      /* ==========================================================================
         2. VTECH GENIO LAPTOP LAYOUT (Viewports: 768px to 1024px wide)
         ========================================================================== */
      @media screen and (min-width: 768px) and (max-width: 1024px) {
          body {
              padding: 30px;
          }

          .logo-img {
              max-height: 75px; /* Scaled medium size for the 7" display */
              margin-top: 30px;
          }

          .search-wrapper, #___gcse_0 {
              max-width: 550px !important; /* Constrains layout width on laptop */
          }
      }

      /* ==========================================================================
         3. STANDARD DESKTOP LAYOUT (Viewports: Greater than 1024px wide)
         ========================================================================== */
      @media screen and (min-width: 1025px) {
          body {
              padding: 50px;
          }

          .logo-img {
              max-height: 100px; /* Full size sharp logo on large monitors */
              margin-top: 50px;
          }

          .search-wrapper, #___gcse_0 {
              max-width: 750px !important; /* Elegant widescreen look for computers */
          }
      }
    </style>
  </head>
  <body>
    
    <!-- GOOGLE ENGINE SCRIPT -->
    <script async src="https://cse.google.com/cse.js?cx=b09fcdac1f01b4622"></script>
        
    <!-- SEARCH CONTAINER -->
    <div class="search-wrapper">
        
        <!-- Fix: Set class to "logo-img" so your CSS height rule actually applies -->
        <img class="logo-img" src="https://i.postimg.cc/Hs2hsq3c/4-S-Engine-16-5-2026.png" alt="4 S-Engine Logo">
      
        <!-- Google Search Bar -->
        <div class="gcse-search"></div>
      
        <!-- Subtext -->
        <h4 style="font-family: Trebuchet MS, sans-serif; color: #1b2516;"> 
            <em>...a search engine by Westmynster</em>
        </h4>
    </div>
  </body>
</html>
