<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 S-Engine Home</title>
        <style>
      /* ==========================================================================
         1. THE UNIVERSAL DESKTOP LAYOUT (Desktop, Genio Laptop, and Mobile Base)
         ========================================================================== */
      body {
          background-color: #f1f6ef !important;
          font-family: Arial, sans-serif;
          text-align: center;
          margin: 0;
          padding: 40px; /* Roomy desktop padding */
      }

      /* This locks EVERYTHING into desktop mode across all three devices */
      .search-wrapper {
          width: 100%;
          max-width: 750px; /* Wide desktop container width from your picture */
          margin: 0 auto;
          box-sizing: border-box;
      }

      /* Massive custom logo that scales beautifully */
      .logo-img {
          width: 85% !important;     
          max-width: 420px !important; 
          height: auto !important;
          margin-top: 30px;
          margin-bottom: 20px;
          display: inline-block;
      }

      /* Forces the real Google CSE elements to stay perfectly aligned and centered */
      #___gcse_0, .gcse-search, .gsc-control-cse {
          width: 100% !important;
          max-width: 100% !important;
          margin: 0 auto !important;
          padding: 0 !important;
          background-color: transparent !important;
          border: none !important;
      }

      /* Fixes Google's unaligned text-input table cells */
      table.gsc-search-box {
          margin: 0 auto !important;
          width: 100% !important;
      }

      td.gsc-input {
          padding-right: 0 !important; /* Strips Google's uneven side gap */
      }


      /* ==========================================================================
         2. THE EXTRA MOBILE ZOOM SNIPPET (Only active on phone screens)
         ========================================================================== */
      @media screen and (max-width: 767px) {
          html {
              /* Zooms the desktop layout on phones to match your drawing */
              zoom: 115% !important; 
              -moz-transform: scale(1.15); /* Firefox backup scale fix */
              -moz-transform-origin: top center;
          }
          
          body {
              padding: 15px; /* Slightly closer to the edges on phone screens */
          }
        /* ==========================================================================
   WIPE AWAY ONLY THE BOX THINGY
   ========================================================================== */
.gsc-webResult.gsc-result, 
.gsc-results .gsc-imageResult,
.gsc-webResult {
    background-color: transparent !important;
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
}
      }
    </style>
  </head>
