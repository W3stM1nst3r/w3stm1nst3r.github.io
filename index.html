<!DOCTYPE html>
<html lang="en">
  <head>

    <title>4 S-Engine Home</title>
        <style>
/* ==========================================================================
   4 S-ENGINE FRESH RESTART: PERFECT CENTERING & BACKGROUND ONLY
   ========================================================================== */

/* 1. Sets background color and centers everything on the screen */
body {
    background-color: #f1f6ef !important;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px 20px;
    
    /* Flexbox layout to force perfect centering down the middle */
    display: flex;
    flex-direction: column;
    align-items: center; 
    text-align: center;
}

/* 2. Keeps your layout container perfectly centered and sized */
.search-wrapper {
    width: 100%;
    max-width: 750px;
    margin: 0 auto;
    
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 3. Forces Google's outer framework boxes to align perfectly straight */
#___gcse_0, 
.gcse-search, 
.gsc-control-cse {
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 auto !important;
    padding: 0 !important;
    background-color: transparent !important;
    border: none !important;
}

/* 4. Fixes Google's crooked table offsets so the search bar sits dead center */
table.gsc-search-box {
    margin: 0 auto !important;
    width: 100% !important;
}

td.gsc-input {
    padding-right: 0 !important; /* Removes the hidden gap that makes it crooked */
}
    </style>
  </head>
  <body>

    <div class="search-wrapper">
        <!-- 1. Your Logo Graphic -->
        <img class="logo-img" src="https://i.postimg.cc/Hs2hsq3c/4-S-Engine-16-5-2026.png" alt="4 S-Engine Logo">
