<!DOCTYPE html>
<html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 S-Engine Home</title>
        <style>
      /* ==========================================================================
         1. BASE SYSTEM (Applies to all devices so they match your desktop layout)
         ========================================================================== */
      body {
          background-color: #f1f6ef !important;
          font-family: Arial, sans-serif;
          text-align: center;
          margin: 0;
          padding: 20px;
      }

      /* Wrapper layout box - keeps the design wide and elegant everywhere */
      .search-wrapper {
          display: grid;
          grid-template-columns: 1fr;
          justify-items: center;
          width: 100%;
          max-width: 750px; /* Locks the desktop layout width so it never squishes */
          margin: 0 auto;
          box-sizing: border-box;
      }

      /* Forces Google CSE frame to stay wide and expansive */
      #___gcse_0, .gcse-search {
          width: 100% !important;
          max-width: 100% !important;
      }

      /* ==========================================================================
         2. MOBILE DEVICE RULES (Forces the big logo look from your drawing)
         ========================================================================== */
      @media screen and (max-width: 767px) {
          .logo-img {
              width: 90% !important;     /* Blows the logo up massive on phones */
              max-width: 450px !important;
              height: auto !important;
              margin: 40px auto 25px auto;
          }
          
          .search-wrapper {
              padding: 0 10px; /* Prevents edge cutting while remaining wide */
          }
      }

      /* ==========================================================================
         3. LAPTOP & DESKTOP RULES (Keeps the layout standard)
         ========================================================================== */
      @media screen and (min-width: 768px) {
          .logo-img {
              max-height: 100px !important; /* Standard crisp desktop logo size */
              width: auto !important;
              margin: 50px auto 30px auto;
          }
      }
    </style>

  </head>
  <body>
    
    <!-- GOOGLE ENGINE SCRIPT -->
    <script async src="https://cse.google.com/cse.js?cx=b09fcdac1f01b4622"></script>
        
    <!-- SEARCH CONTAINER -->
    <div class="search-wrapper">
        
        <!-- Logo Image -->
        <img class="logo-img" src="https://i.postimg.cc/Hs2hsq3c/4-S-Engine-16-5-2026.png" alt="4 S-Engine Logo">
      
        <!-- Google Search Bar -->
        <div class="gcse-search"></div>
      
        <!-- Subtext -->
        <h4 style="font-family: Trebuchet MS, sans-serif; color: #1b2516;"> 
            <em>...a search engine by Westmynster</em>
        </h4>
    </div>
    
  </body>
</html>
