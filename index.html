<!DOCTYPE html>
<html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 S-Engine Home</title>
<style>
    body {
        background-color: #f1f6ef !important;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    .search-wrapper {
        width: 100%;
        max-width: 700px; /* Keeps everything locked in a clean desktop width */
        margin: 0 auto;
        box-sizing: border-box;
    }

    /* Massive mobile logo, normal desktop logo */
    .logo-img {
        width: 85% !important;
        max-width: 420px !important;
        height: auto !important;
        margin: 40px auto 25px auto;
        display: inline-block;
    }

    /* CUSTOM BAR: Perfectly aligned and uniform */
    .custom-search-form {
        display: flex;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        border: 2px solid #1b2516;
        border-radius: 24px; /* Gives it smooth round search edges */
        overflow: hidden;
        background: #ffffff;
    }

    .search-input {
        flex: 1;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        outline: none;
    }

    .search-button {
        background-color: #1b2516;
        color: #ffffff;
        border: none;
        padding: 0 25px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
    }

    .search-button:hover {
        background-color: #33442c;
    }

    /* Fixes Google's injected result layout box styling */
    .gcse-searchresults-only {
        width: 100% !important;
        margin-top: 30px !important;
        text-align: left !important;
    }
</style>
  </head>
  <body>
    <div class="search-wrapper">
        <!-- Your Great Logo -->
        <img class="logo-img" src="https://postimg.cc" alt="4 S-Engine Logo">
        
        <!-- Clean, Centered Custom Search Bar -->
        <form action="" method="get" class="custom-search-form">
            <input type="text" name="q" placeholder="Search 4 S-Engine..." class="search-input">
            <button type="submit" class="search-button">Search</button>
        </form>

        <!-- Subtext -->
        <h4 style="font-family: Trebuchet MS, sans-serif; color: #1b2516; margin-top: 25px;"> 
            <em>...a search engine by Westmynster</em>
        </h4>

        <!-- Google's Results Container (Hidden until user searches) -->
        <div class="gcse-searchresults-only"></div>
    </div>

    <!-- The Correct Google Engine Script -->
    <script async src="https://google.com"></script>
</body>

</html>
